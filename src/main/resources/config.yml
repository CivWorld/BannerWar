# Note: Do not modify config_version, unless you want to regenerate your config
config_version: 1.7

# Please see https://github.com/TownyAdvanced/FlagWar/tree/main/src/main/resources/
# for available translations. Custom translations are only supported if they are merged.
translation: "en_US"

# (Cosmetic) Show the ASCII banner on startup. Disable for cleaner/smaller server logs.
show-startup-marquee: true

# General Gameplay Rules
rules:
    # Disabling this effectively disables the whole plugin... but some event listeners will still operate.
    allow_attacks: true

    # Force attackers to only attack edge plots.
    only_attack_borders: true

    # Prevent attacks on townblocks with x neighbouring plots.
    # When enabled plots will be protected from attack by neighbouring plots. Flag war will check North,
    # East, South and West of the plot under attack. By default, this requires 3 plots for protection,
    # requiring attackers to begin from a corner. This Rule should be accompanied by the
    # flag_takes_ownership_of_town_blocks: true Rule.
    limit_attacks_based_on_neighbouring_plots: false

    # How many neighbour plots are required to prevent an attack? Do not set this value to 0.
    neighbouring_plots_required_to_prevent_attack: 3

    # False: Attackers capture plots when they win. Disable if you prefer *not* dealing with that.
    flag_unclaims_townblocks: false

    # True: Attackers capture plots when they win. Disable if you prefer *not* dealing with that.
    # This has no effect if flag_unclaims_townblocks is true.
    flag_takes_ownership_of_town_blocks: true

    # Will prevent players from performing certain actions while a town is flagged or is in cool-down.
    prevent_interaction_while_flagged:
        # Will prevent Towns from leaving Nations, setting HomeBlocks, and un-claiming land; prevent player desertion.
        town: true
        # Will prevent Nations from withdrawing money while actively flagged.
        nation: true

    # Cool-down period for prevented interactions after a flag has been placed.
    # Recommended being equal or greater in value to the "flag.waiting_time".
    prevented_interaction_cooldown: "10m"

    # Are nations able to toggle on their neutrality, when FlagWar's allow_attacks is true?
    nations_can_toggle_neutral: false

    # Depth (meters) below sea-level a flag may be placed. (world-defined)
    # Notice: Flags are still subject to submersion checks at this time.
    flag_depth_allowance: 12

    # Determines accuracy of location broadcasts.
    # "towny" = Towny World Coordinates (`/towny map`)
    # "precise" = X,Y,Z coordinates of the flag's base block.
    flag_broadcast_accuracy: "towny"

player_limits:
    min_online_in_town: 1
    min_online_in_nation: 1
    min_online_in_town_to_attack: 1
    min_online_in_nation_to_attack: 1
    max_active_flags_per_player: 1

# Defines the War Flag structure.
# If the defined block is air, or is affected by gravity, it will be overridden by our defaults.
flag:
    waiting_time: "1m" # Time to capture a plot.
    base_block: 'OAK_FENCE' # Block required to place a flag.
    light_block: 'TORCH' # TORCH and SOUL_TORCH good. REDSTONE_TORCH questionable.

# Defines the War Flag timer blocks.
timer_blocks:
    # Will use the classic wool palette if true.
    use_default: true
    # Will set the timer blocks. Each entry is allotted an equal amount of time.
    # Use multiple entries to achieve more granularity. Case-insensitive.
    blocks:
        - lime_terracotta
        - green_terracotta
        - blue_terracotta
        - cyan_terracotta
        - light_blue_terracotta
        - gray_terracotta
        - white_terracotta
        - pink_terracotta
        - orange_terracotta
        - red_terracotta

# Defines War Flag Hologram settings
# Requires a supported hologram provider.
holograms:
    # If true, and if a provider is present, holograms will appear when a war flag is placed.
    enabled: true
    # Defines the lines of the hologram. The number indicates the line number. Starts at zero.
    # Use an item type to add a floating item.
    # Use a text type to add text.
    # Use the timer type to indicate the time left. Only one timer line may be used.
    # The timer formatting can be customized as described here:
    # https://docs.oracle.com/en/java/javase/16/docs/api/java.base/java/util/Formatter.html
    # Argument Index: Seconds is the first argument, minutes the second argument, and hours the third argument.
    lines:
        0:
            type: item
            data: DIAMOND_SWORD
        1:
            type: text
            data: "&c&lBattle Flag"
        2:
            type: timer
            data: "&aTime Left: %2$d:%1$02d"

# Define Beacon Structure
beacon:
    draw: true
    radius: 3
    height_above_flag.min: 3
    height_above_flag.max: 64
    wireframe_block: 'GLOWSTONE'

# Define Economy Transactions
economy:
    town_block_captured: 10.0
    home_block_captured: 100.0
    war_flag_cost: 10.0
    attack_defended_reward: 10.0

# Define what is allowed to take place in TownBlocks which have attacks ongoing.
warzone:
    # List of materials that can be modified in a warzone.
    # '$' = Allow all materials.
    # Prepend a '-' in front of a material to remove it. Used in conjunction with when you use '$'.
    # Eg: '$,-chest,-furnace'
    editable_materials: $
    item_use: true
    switch: true

    # Add '-fire' to editable materials for complete protection when setting is false. This prevents fire to be created and spread.
    fire: true
    explosions: true
    explosions_break_blocks: true

    # The space around the flag where editable materials cannot be used.
    protected_area_surrounding_flag: 0
    # The space above the flag where editable materials cannot be used.
    protected_area_above_flag: 20
extra:
    # If enabled, show additional debug messages as warnings. Recommended keeping these disabled unless requested.
    debug: false

#######################################
# BANNERWAR CONFIGURATIONS START HERE #
#######################################

# Define global information about the server that this plugin runs on.
universe:

    # The number of Towny days that have passed since the plugin was installed,
    # assuming the plugin was enabled during the new day event.
    # Do NOT modify this unless you are willing to mess with upkeep values.
    current_day: 1

    # All materials that will not be pasted by the post-war chunk pasting system. Case-insensitive.
    blacklisted_materials:
        - diamond_ore
        - diamond_block
        - gold_ore
        - gold_block

# Define settings relating to battle features.
battle:

    # Define timing multipliers for each battle stage.
    # If the multiplier is set to 2.0, that stage will take twice as long as it would've at 1.0.
    # Values of 0.0 or less will be taken as 1.0.
    # The dormant stage's timings are clamped such that the stage can never be shorter than a day.
    timing_multipliers:

        # The time multiplier for the pre-flag stage, the stage before flagging is allowed.
        pre_flag: 1.0

        # The time multiplier for the pre-flag stage, the stage where flagging is allowed.
        flag: 1.0

        # The time multiplier for the pre-flag stage, the stage where a town lost the battle defense and is ruined.
        ruined: 1.0

        # The time multiplier for the pre-flag stage, the stage where a town is under cooldown from a battle.
        dormant: 1.0


# Define price, item of payment and other actions relating to the flag lives system.
flag_lives:

    # How many lives you can add.
    count: 3

    # How long the flag's lifetime is extended by every life addition. Measured in seconds.
    lifetime_increase: 5

    # The item used to make payments for flag life increases. Case-insensitive.
    # If the item is not recognized, gold ingots will be used by default.
    item_of_payment: gold_ingot

    # The base price of the configured item of payment. This is NOT the price of flag life increases.
    # The price of a flag life increase is calculated using p = b * 2^n,
    # where p is the price, b is the base price as can be configured below,
    # and n is the nth added life to this flag.
    # E.g. a base price of 4 would mean that the second extra life costs 4 * 2^2 = 16 items.
    base_price: 4

    # How long into the flag's lifetime until flag lives cannot be added anymore. Measured in seconds.
    time_until_no_more_lives: 10

    # How long a flag becomes 'invincible' after having a life taken away. Measured in seconds.
    invincibility_duration: 1

    # The block type that the flag will be in to denote that it is 'invincible'. Case-insensitive.
    # NOTE: the flag will still be breakable if the supplied material is breakable,
    # hence the apostrophes around 'invincible'.
    invincibility_material: bedrock

# Define settings relating to the internal clock that updates battles, database storage and GUI information.
clock:

    # The rate at which the clock ticks; the clock speed. Measured in seconds per cycle.
    # Increase this number if your server is struggling to accommodate a large number of battles.
    # Decrease this number if you find that battles are not updating fast enough.
    # Fractional numbers will have their fractional part removed.
    cycle_speed: 3


# Define various values, settings and percentages to be applied to TownyCivics related actions.
civics:

    # Define configurations for all CivTechs that this plugin incorporates.
    civtechs:

        # Define configurations of the "Infernal War Flags" CivTech.
        infernal_warflags:

            # The block used to represent an infernal flag. Case-insensitive
            # If the material is not recognized, ancient debris will be used by default.
            material: ancient_debris

            # How long the flag's lifetime is extended by the activation of this CivTech.
            # Measured in seconds.
            lifetime_increase: 20

        # Define configurations of the "Caesar Cipher" CivTech.
        caesar_cipher:

            # The delay of flag position announcements. Measured in seconds.
            delay: 10

        # Define configurations of the "Attrition Doctrine" CivTech.
        attrition_doctrine:

            # How long the flag's lifetime is extended at the start of every flag place by the presence of this CivTech.
            lifetime_increase: 10

        # Define configurations of the "War Economy" CivTech.
        war_economy:

            # The percentage decrease applied to all increases in weariness if the CivTech exists.
            percentage_weariness_decrease: 15

    # Define various percentage increases, decreases and thresholds of war weariness
    # associated with battle-related actions.
    war_weariness:

        # The amount money percentages are multiplied with to make the final upkeep price.
        base_price: 10

        # Define the weariness percentage changes due to a flag place.
        flag_place:
            attacker_increase: 1

        # Define the weariness percentage changes due to a flag defense.
        flag_defend:
            attacker_increase: 1
            defender_decrease: 1

        # Define the weariness percentage changes due to a flag victory.
        flag_win:
            attacker_increase: 1

        # Define the weariness percentage changes due to a successful battle defense.
        defense_won:
            attacker:
                autocracy_increase: 50
                non_autocracy_increase: 10
            defender:
                autocracy_decrease: 25
                non_autocracy_decrease: 10

        # Define the weariness percentage changes due to a failed battle defense.
        defense_lost:
            attacker:
                autocracy_decrease: 10
            defender:
                autocracy_increase: 50
                non_autocracy_increase: 10

        # Define the weariness percentage threshold until you can no longer leave a town.
        town_leave_threshold: 15

        # Define the weariness percentage changes due to a new day.
        new_day:
            guaranteed_decrease: 2
            expired_banner_placer_decrease: 3
            days_until_expired: 7
