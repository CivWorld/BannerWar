name: ${artifactId}
main: ${groupId}.${artifactId}
version: ${project.version}
api-version: ${project.bukkitAPIVersion}

authors:
    - Shade / Zren (CellWar, Towny)
    - ElgarL (TownyAdvanced)
    - LlmDl (TownyAdvanced)
    - TheFlagCourier (FlagWar)
    - Various Contributors

website: ${organization.url}

prefix: BannerWar

description: ${description}

folia-supported: true

softdepend:
    - DecentHolograms
    - WorldEdit
    - PlayerLocatorAPI
    - Boutique

depend:
    - Towny
    - townyAI

commands:
    StageAdvance:
        description: Advances the stage of a battle. E.g. Pre-Flag --> Flag
        usage: §cUsage - /<command> <TownName> OR /<command> <TownName> <isDefenderWinner>
        aliases:
            - PhaseAdvance
            - pa
            - sa
    BannerWarReload:
        description: Reloads the configuration file for BannerWar.
        usage: §cUsage - /<command>
        aliases:
            - bwreload
            - bwr
